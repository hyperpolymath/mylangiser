# SPDX-License-Identifier: MPL-2.0
# Dependabot configuration for RSR-compliant repositories
# Covers common ecosystems - remove unused ones for your project

version: 2
updates:
  # GitHub Actions - always include
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  # Rust/Cargo
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Elixir/Mix
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"

  # Node.js/npm
    ignore:
      # Estate policy standards#301 / docs/DEPENDABOT-POLICY.adoc:
      # ignore semver-major bumps so they land via author-supplied PRs
      # paired with call-site updates. Minor + patch flow normally.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python/pip
    ignore:
      # Estate policy standards#301 / docs/DEPENDABOT-POLICY.adoc:
      # ignore semver-major bumps so they land via author-supplied PRs
      # paired with call-site updates. Minor + patch flow normally.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Nix flakes
    ignore:
      # Estate policy standards#301 / docs/DEPENDABOT-POLICY.adoc:
      # ignore semver-major bumps so they land via author-supplied PRs
      # paired with call-site updates. Minor + patch flow normally.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Estate policy standards#301 / docs/DEPENDABOT-POLICY.adoc:
      # ignore semver-major bumps so they land via author-supplied PRs
      # paired with call-site updates. Minor + patch flow normally.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
